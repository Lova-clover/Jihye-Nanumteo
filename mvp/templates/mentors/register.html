<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멘토 등록 - 지혜나눔터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #4A90D9 0%, #5BA3E0 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="gradient-bg text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center space-x-2">
                    <span class="text-3xl">🎓</span>
                    <span class="text-xl font-bold">지혜나눔터</span>
                </a>
                <div class="flex space-x-6">
                    <a href="/programs" class="hover:text-yellow-200 transition">프로그램</a>
                    <a href="/mentors" class="hover:text-yellow-200 transition">어르신 멘토</a>
                    <a href="/mentors/register" class="text-yellow-200 font-bold">멘토 등록</a>
                    <a href="/admin" class="bg-white/20 px-4 py-1 rounded-full hover:bg-white/30 transition">관리자</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <span class="text-6xl">👨‍🏫</span>
            <h1 class="text-3xl font-bold mt-4 mb-2">멘토로 참여하기</h1>
            <p class="text-gray-600">어르신의 경험과 지혜를 젊은 세대에게 전해주세요</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <form action="/mentors/register" method="POST" class="space-y-6">
                <!-- 기본 정보 -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">성함 *</label>
                        <input type="text" name="name" required 
                               class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                               placeholder="홍길동">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">연세 *</label>
                        <input type="number" name="age" required min="60" max="100"
                               class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                               placeholder="70">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">연락처 *</label>
                    <input type="tel" name="phone" required
                           class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                           placeholder="010-1234-5678">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">나눌 수 있는 지혜 (전문분야) *</label>
                    <select name="expertise" required 
                            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg">
                        <option value="">선택해 주세요</option>
                        <option value="전통음식">🍲 전통 음식 (요리, 반찬, 발효식품 등)</option>
                        <option value="농사/텃밭">🌱 농사 / 텃밭 가꾸기</option>
                        <option value="다도/예절">🎎 다도 / 전통 예절</option>
                        <option value="한지공예">📜 한지 공예</option>
                        <option value="목공예">🪵 목공예</option>
                        <option value="바느질/뜨개질">🧵 바느질 / 뜨개질</option>
                        <option value="서예/그림">🖌️ 서예 / 그림</option>
                        <option value="기타">기타</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">해당 분야 경력 *</label>
                    <div class="flex items-center">
                        <input type="number" name="experience_years" required min="1" max="80"
                               class="w-24 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg text-center"
                               placeholder="30">
                        <span class="ml-2 text-lg">년</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">활동 가능 요일 *</label>
                    <div class="flex flex-wrap gap-2">
                        {% for day in ['월', '화', '수', '목', '금', '토', '일'] %}
                        <label class="flex items-center px-4 py-2 border rounded-lg cursor-pointer hover:bg-blue-50">
                            <input type="checkbox" name="days" value="{{ day }}" class="mr-2">
                            {{ day }}요일
                        </label>
                        {% endfor %}
                    </div>
                    <input type="hidden" name="available_days" id="available_days">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">거주 지역 *</label>
                    <input type="text" name="location" required
                           class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                           placeholder="안동시 풍천면">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">자기소개 *</label>
                    <textarea name="introduction" required rows="5"
                              class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                              placeholder="어떤 경험을 가지고 계신지, 어떤 것을 가르쳐 주고 싶으신지 자유롭게 써 주세요."></textarea>
                </div>

                <button type="submit" class="w-full gradient-bg text-white py-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                    멘토 등록 신청하기
                </button>
            </form>
        </div>

        <div class="mt-8 bg-amber-50 rounded-xl p-6">
            <h3 class="font-bold text-lg mb-3">💡 멘토로 참여하시면</h3>
            <ul class="space-y-2 text-gray-700">
                <li>✅ 활동비가 지급됩니다 (회당 30,000원)</li>
                <li>✅ 어르신의 경험이 다음 세대에 전해집니다</li>
                <li>✅ 건강한 사회 활동을 하실 수 있습니다</li>
                <li>✅ 대학생들과 교류하며 활력을 얻습니다</li>
            </ul>
        </div>
    </div>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-400">
            <p>지혜나눔터 | 국립경국대학교 G-AFC 고령친화사업단</p>
        </div>
    </footer>

    <script>
        // 체크박스 값을 hidden input에 저장
        document.querySelector('form').addEventListener('submit', function(e) {
            const checkboxes = document.querySelectorAll('input[name="days"]:checked');
            const days = Array.from(checkboxes).map(cb => cb.value).join(',');
            document.getElementById('available_days').value = days || '미정';
        });
    </script>
</body>
</html>
